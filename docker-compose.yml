services:
  postgres:
    image: postgres:16
    container_name: codecompass-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codecompass}
      POSTGRES_USER: ${POSTGRES_USER:-codecompass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codecompass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codecompass} -d ${POSTGRES_DB:-codecompass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.15
    container_name: codecompass-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-research123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-research123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codecompass-api
    environment:
      POSTGRES_URL: postgresql+psycopg2://${POSTGRES_USER:-codecompass}:${POSTGRES_PASSWORD:-codecompass}@postgres:5432/${POSTGRES_DB:-codecompass}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-research123}
      ALLOWED_LOCAL_ROOT: /host_projects
      REPOS_STORAGE_ROOT: /data/repos
      AUTO_REINDEX_INTERVAL_SECONDS: ${AUTO_REINDEX_INTERVAL_SECONDS:-60}
      DEFAULT_POLL_INTERVAL_SECONDS: ${DEFAULT_POLL_INTERVAL_SECONDS:-60}
      MAX_GRAPH_NODES_FULL_VIEW: ${MAX_GRAPH_NODES_FULL_VIEW:-3000}
      MAX_GRAPH_EDGES_FULL_VIEW: ${MAX_GRAPH_EDGES_FULL_VIEW:-7000}
      AST_EXCLUDED_DIRNAMES: ${AST_EXCLUDED_DIRNAMES:-.git,__pycache__,venv,.venv,site-packages,node_modules,dist,build,.mypy_cache,.pytest_cache,.tox}
      API_INTERNAL_URL: http://api:8000
      MCP_DEFAULT_COMMAND: python /app/mcp_server.py
      MCP_DEFAULT_TRANSPORT: ${MCP_DEFAULT_TRANSPORT:-streamable-http}
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8811}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
      MCP_HTTP_PUBLIC_URL: ${MCP_HTTP_PUBLIC_URL:-http://localhost:8811/mcp}
      MCP_HTTP_STATELESS: ${MCP_HTTP_STATELESS:-true}
    volumes:
      - ./backend:/app
      - repos_data:/data/repos
      - ${HOST_PROJECTS_ROOT}:/host_projects
    ports:
      - "8000:8000"
      - "${MCP_HTTP_PORT:-8811}:${MCP_HTTP_PORT:-8811}"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codecompass-web
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  repos_data:
